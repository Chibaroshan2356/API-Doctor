<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Theme Test</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class'
        }
    </script>
</head>
<body class="bg-gray-100 dark:bg-gray-900 p-8">
    <div class="max-w-4xl mx-auto">
        <h1 class="text-3xl font-bold text-gray-900 dark:text-white mb-6">
            Theme Test Page
        </h1>
        
        <div class="bg-white dark:bg-gray-800 rounded-lg p-6 mb-6">
            <h2 class="text-xl font-semibold text-gray-900 dark:text-white mb-4">
                Test Elements
            </h2>
            
            <button onclick="toggleTheme()" class="px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 mb-4">
                Toggle Theme
            </button>
            
            <div class="grid grid-cols-2 gap-4">
                <div class="bg-gray-50 dark:bg-gray-700 p-4 rounded">
                    <p class="text-gray-900 dark:text-white">Light/Dark Text</p>
                </div>
                <div class="bg-blue-100 dark:bg-blue-900 p-4 rounded">
                    <p class="text-blue-900 dark:text-blue-100">Blue Theme</p>
                </div>
            </div>
        </div>
        
        <div class="bg-gray-100 dark:bg-gray-800 p-4 rounded">
            <p class="text-gray-600 dark:text-gray-400">
                Current theme: <span id="theme-status" class="font-mono">light</span>
            </p>
        </div>
    </div>

    <script>
        function toggleTheme() {
            const html = document.documentElement;
            const isDark = html.classList.contains('dark');
            
            if (isDark) {
                html.classList.remove('dark');
                document.getElementById('theme-status').textContent = 'light';
            } else {
                html.classList.add('dark');
                document.getElementById('theme-status').textContent = 'dark';
            }
            
            console.log('Theme toggled to:', isDark ? 'light' : 'dark');
        }
        
        // Check initial theme
        document.addEventListener('DOMContentLoaded', () => {
            const isDark = document.documentElement.classList.contains('dark');
            document.getElementById('theme-status').textContent = isDark ? 'dark' : 'light';
        });
    </script>
</body>
</html>
