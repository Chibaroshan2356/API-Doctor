# Server Configuration
server.port=${PORT:8083}
server.address=0.0.0.0

# Application Configuration
spring.application.name=API Doctor Backend

# Active profile - set via SPRING_PROFILES_ACTIVE env var on Railway

# Database Configuration (Railway env vars - used in prod)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/apidoctor}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:admin}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Entity Scanning
spring.jpa.packages-to-scan=com.apidoctor.api_doctor.entity

# CORS Configuration
spring.web.cors.allowed-origins=${ALLOWED_ORIGINS:http://localhost:5173,http://localhost:5174,http://localhost:3000}
spring.web.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
spring.web.cors.allowed-headers=*
spring.web.cors.allow-credentials=true
spring.web.cors.exposed-headers=*
spring.web.cors.max-age=3600

# Health Check Configuration
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always
