server.port=${PORT:8080}
server.address=0.0.0.0

spring.application.name=API Doctor Backend

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/apidoctor}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:admin}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

spring.jpa.packages-to-scan=com.apidoctor.api_doctor.entity

spring.web.cors.allowed-origins=${ALLOWED_ORIGINS:http://localhost:5173,http://localhost:5174}
spring.web.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
spring.web.cors.allowed-headers=*
spring.web.cors.allow-credentials=false
spring.web.cors.max-age=3600

management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always
