[build]
builder = "NIXPACKS"
buildCommand = "mvn clean package -DskipTests -U"

[deploy]
startCommand = "java -Dspring.datasource.url=$SPRING_DATASOURCE_URL -Dspring.datasource.username=$SPRING_DATASOURCE_USERNAME -Dspring.datasource.password=$SPRING_DATASOURCE_PASSWORD -Dserver.port=$PORT -jar target/api-doctor-0.0.1-SNAPSHOT.jar"
restartPolicyType = "ON_FAILURE"
